apiVersion: batch/v1
kind: CronJob
metadata:
  name: shared-postgres-backup
  namespace: database
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: postgres:15-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: shared-postgres-secret
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  BACKUP_FILE="/backups/shared-postgres-$(date +%Y-%m-%d-%H%M%S).sql.gz"
                  pg_dumpall -h shared-postgres.database.svc.cluster.local -U postgres | gzip > "$BACKUP_FILE"
                  find /backups -name "shared-postgres-*.sql.gz" -mtime +30 -delete
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              hostPath:
                path: /srv/backups/postgres
                type: DirectoryOrCreate
