apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguardhome
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguardhome
  template:
    metadata:
      labels:
        app: adguardhome
    spec:
      containers:
      - name: adguardhome
        image: adguard/adguardhome:latest
        ports:
        - containerPort: 3000
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: adguardhome
  namespace: adguard
spec:
  type: NodePort
  selector:
    app: adguardhome
  ports:
  - name: web
    port: 3000
    targetPort: 3000
    nodePort: 30080
  - name: dnsudp
    port: 53
    targetPort: 53
    protocol: UDP
    nodePort: 30053
  - name: dnstcp
    port: 53
    targetPort: 53
    protocol: TCP
    nodePort: 30054
