apiVersion: v1
kind: Service
metadata:
  name: adguardhome
  namespace: adguard
spec:
  type: LoadBalancer
  selector:
    app: adguardhome
  ports:
    - name: web
      port: 80
      targetPort: 80
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
